name: Polar Bear - Cross-Browser Tests

on:
  schedule:
    - cron: '0 2 * * *'

jobs:
  test:
    name: Tests - ${{ matrix.browser }} on ${{ matrix.os }}
    timeout-minutes: 60
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # Scheduled job (2am): Run all browsers + mobile for comprehensive testing
        # Push/PR: Run chromium only for fast feedback
        browser: ${{ github.event_name == 'schedule' && fromJSON('["chromium", "firefox", "webkit", "mobile-chrome", "mobile-safari"]') || fromJSON('["chromium"]') }}
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.5.0'
          cache: 'npm'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npm list @playwright/test --depth=0 --json | jq -r '.dependencies."@playwright/test".version')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-${{ matrix.browser }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Install Playwright system dependencies
        if: steps.cache-playwright.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}

      - name: Start Docker application
        working-directory: ./app
        run: |
          docker compose up -d
          echo "Waiting for application to be ready..."
          timeout 60 bash -c 'until curl -f http://localhost:4200 > /dev/null 2>&1; do sleep 2; done' || echo "Application may not be fully ready"

      - name: Run Playwright tests
        run: npm test -- --project=${{ matrix.browser }}
        env:
          CI: true
          BASE_URL: http://localhost:4200

      - name: Stop Docker application
        if: always()
        working-directory: ./app
        run: docker compose down

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Upload test results JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.browser }}
          path: test-results/
          retention-days: 30

  summary:
    name: Test Summary
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Test Summary
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Browsers**: ${{ github.event_name == 'schedule' && 'chromium, firefox, webkit' || 'chromium' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: local (http://localhost:4200)" >> $GITHUB_STEP_SUMMARY
